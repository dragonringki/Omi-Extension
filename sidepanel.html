<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #660066; 
            color: #E0E0E0; 
            font-family: Arial, sans-serif; 
            padding: 10px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 98vh;
            overflow: hidden;
        }
        
        h3 { 
            margin: 0 0 10px 0; 
            color: #FFFFFF; 
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .controls { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 10px; 
        }

        button { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 14px;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }
        
        #startBtn { background: #2E7D32; color: white; }
        #stopBtn { background: #C62828; color: white; display: none; }
        
        #chatLog { 
            flex: 1; 
            overflow-y: auto; 
            background: #1E1E1E; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .msg { 
            margin-bottom: 12px; 
            padding: 10px; 
            border-radius: 6px; 
            word-wrap: break-word;
            max-width: 85%;
        }
        .sys { background: #333333; color: #AAAAAA; font-size: 12px; border-left: 3px solid #555; align-self: flex-start; }
        .user { background: #005A9E; color: #FFFFFF; align-self: flex-end; border-right: 3px solid #64B5F6; }
        .omi { background: #1B5E20; color: #FFFFFF; align-self: flex-start; border-left: 3px solid #4CAF50; }
        
        #inputArea { 
            display: none; 
            flex-direction: column; 
            gap: 8px; 
        }

        textarea { 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #444; 
            background: #2D2D2D; 
            color: white; 
            resize: none;
            font-family: inherit;
            font-size: 14px;
        }

        textarea:focus {
            outline: 2px solid #0078D4;
            border-color: transparent;
        }

        .toggles {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #BBBBBB;
            margin-bottom: 5px;
        }

        .toggles label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #sendBtn { 
            background: #0078D4; 
            color: white; 
            width: 100%;
        }

        #chatLog::-webkit-scrollbar { width: 6px; }
        #chatLog::-webkit-scrollbar-track { background: #121212; }
        #chatLog::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>
    <h3>Omi Session</h3>
    
    <div class="controls">
        <button id="startBtn">Start Session</button>
        <button id="stopBtn">Stop Session</button>
    </div>
    
    <div id="chatLog">
        <div class="msg sys">System: Ready. Start session to capture browser context.</div>
    </div>
    
    <div id="inputArea">
        <textarea id="userInput" rows="4" placeholder="Enter your thoughts or questions..."></textarea>
        
        <div class="toggles">
            <label><input type="checkbox" id="chkContext" checked> Attach Page Text</label>
            <label><input type="checkbox" id="chkMemory" checked> Save to Memories</label>
        </div>

        <button id="sendBtn">Send</button>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
